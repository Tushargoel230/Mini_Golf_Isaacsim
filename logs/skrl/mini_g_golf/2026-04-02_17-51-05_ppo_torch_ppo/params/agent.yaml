seed: 42
models:
  separate: false
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
    - name: net
      input: STATES
      layers:
      - 256
      - 128
      - 64
      activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: STATES
      layers:
      - 256
      - 128
      - 64
      activations: elu
    output: ONE
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 0.0003
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: true
  entropy_coef: 0.01
  entropy_loss_scale: 0.01
  value_loss_scale: 1.0
  kl_threshold: 0.0
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: 30
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs:
    size: 1
  experiment:
    directory: /home/goel/code-goel/MyCobot_RL/Mini_G/logs/skrl/mini_g_golf
    experiment_name: 2026-04-02_17-51-05_ppo_torch_ppo
    write_interval: 500
    checkpoint_interval: 5000
trainer:
  timesteps: 20000000
  environment_info: log
  close_environment_at_exit: false
